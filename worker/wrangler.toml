name = "real-news-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["0 * * * *"]  # Every hour

[[d1_databases]]
binding = "DB"
database_name = "real-news-db"
database_id = "cb67dbe3-8b17-4763-9dab-cfd59583f268"  # Replace after `wrangler d1 create real-news-db`

[vars]
ALLOWED_ORIGIN = "https://real-news.pages.dev"

[observability]
[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]
enabled = true

# Secrets (set via `wrangler secret put GROQ_API_KEY`):
# - GROQ_API_KEY
# - ADMIN_SECRET  (protects POST /api/admin/refresh)
