name = "real-news-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["0 * * * *"]  # Every hour

[[d1_databases]]
binding = "DB"
database_name = "real-news-db"
database_id = "YOUR_D1_DATABASE_ID"  # Replace after `wrangler d1 create real-news-db`

# [vars]
# ALLOWED_ORIGIN = "https://your-app.pages.dev"

# Secrets (set via `wrangler secret put GEMINI_API_KEY`):
# - GEMINI_API_KEY
