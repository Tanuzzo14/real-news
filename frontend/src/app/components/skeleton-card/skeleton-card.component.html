@for (item of items; track item) {
  <div class="py-5 border-b border-[var(--color-separator)]">
    <!-- Source + time skeleton -->
    <div class="flex items-center gap-2 mb-3">
      <div class="w-5 h-5 rounded-full bg-[var(--color-skeleton)] skeleton-pulse"></div>
      <div class="h-3 w-24 rounded bg-[var(--color-skeleton)] skeleton-pulse"></div>
      <div class="h-3 w-10 rounded bg-[var(--color-skeleton)] skeleton-pulse ml-auto"></div>
    </div>

    <!-- Title skeleton -->
    <div class="h-5 w-full rounded bg-[var(--color-skeleton)] skeleton-pulse mb-2"></div>
    <div class="h-5 w-3/4 rounded bg-[var(--color-skeleton)] skeleton-pulse mb-4"></div>

    <!-- Bullet points skeleton -->
    <div class="space-y-2 mb-4">
      <div class="flex items-start gap-2">
        <div class="w-1.5 h-1.5 rounded-full bg-[var(--color-skeleton)] skeleton-pulse mt-1.5 shrink-0"></div>
        <div class="h-3.5 w-full rounded bg-[var(--color-skeleton)] skeleton-pulse"></div>
      </div>
      <div class="flex items-start gap-2">
        <div class="w-1.5 h-1.5 rounded-full bg-[var(--color-skeleton)] skeleton-pulse mt-1.5 shrink-0"></div>
        <div class="h-3.5 w-5/6 rounded bg-[var(--color-skeleton)] skeleton-pulse"></div>
      </div>
      <div class="flex items-start gap-2">
        <div class="w-1.5 h-1.5 rounded-full bg-[var(--color-skeleton)] skeleton-pulse mt-1.5 shrink-0"></div>
        <div class="h-3.5 w-4/6 rounded bg-[var(--color-skeleton)] skeleton-pulse"></div>
      </div>
    </div>

    <!-- Button skeleton -->
    <div class="h-11 w-full rounded-xl bg-[var(--color-skeleton)] skeleton-pulse"></div>
  </div>
}
